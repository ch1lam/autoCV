<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="generator" content="AutoCV Kami-style HTML">
  <title>AutoCV Resume</title>
  <style>
    @page {
      size: A4;
      margin: 14mm 15mm;
    }

    :root {
      --paper: #f7f1e6;
      --ink: #17243a;
      --muted: #5c6573;
      --line: #d8c9ae;
      --accent: #1f4f7a;
      --accent-soft: #e7eef4;
      --serif: "Source Serif 4", Charter, Georgia, "Times New Roman", serif;
    }

    html {
      color: var(--ink);
      font-family: var(--serif);
      font-size: 10.5pt;
      line-height: 1.46;
    }

    body {
      margin: 0;
      background: var(--paper);
    }

    .sheet {
      min-height: 100%;
    }

    .resume-header {
      border-bottom: 1.6pt solid var(--accent);
      padding-bottom: 7mm;
      margin-bottom: 7mm;
    }

    .name {
      font-size: 24pt;
      line-height: 1.04;
      letter-spacing: 0.02em;
      margin: 0 0 2mm;
      color: var(--accent);
      font-weight: 600;
    }

    .target {
      margin: 0;
      color: var(--ink);
      font-size: 11.5pt;
    }

    .contacts {
      display: flex;
      flex-wrap: wrap;
      gap: 2mm 6mm;
      list-style: none;
      margin: 3mm 0 0;
      padding: 0;
      color: var(--muted);
      font-size: 9.2pt;
    }

    .section {
      break-inside: avoid;
      margin: 0 0 5.5mm;
    }

    .section-title {
      color: var(--accent);
      font-size: 12.5pt;
      font-weight: 600;
      letter-spacing: 0.08em;
      margin: 0 0 2.4mm;
      padding-bottom: 1.2mm;
      border-bottom: 0.7pt solid var(--line);
      text-transform: uppercase;
    }

    .item {
      break-inside: avoid;
      margin: 0 0 3.3mm;
    }

    .item-title {
      font-size: 10.8pt;
      font-weight: 600;
      margin: 0 0 1mm;
    }

    .item-subtitle {
      color: var(--muted);
      font-size: 9.2pt;
      margin: -0.6mm 0 1mm;
    }

    .item-content,
    .bullet-list {
      margin: 0;
    }

    .bullet-list {
      padding-left: 4.5mm;
    }

    .bullet-list li {
      margin: 0 0 1mm;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 0.5pt solid var(--accent-soft);
    }
  </style>
</head>
<body>
  <main class="sheet">
    <!-- AutoCV layout agent fills this body. Keep head and CSS unchanged. -->
  </main>
</body>
</html>
